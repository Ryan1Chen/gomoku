<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="五子棋">
<meta name="theme-color" content="#1a1008">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>五子棋</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #1a1008;
  --bg2:   #2a1e0e;
  --gold:  #d4a843;
  --goldf: #f0c860;
  --board: #c8933a;
  --bdk:   #a0722a;
  --bsh:   #7a5520;
  --line:  #5c3d1a;
  --tl:    #f5e6c8;
  --td:    #a08060;
  --blue:  #74b9ff;
  --green: #2ecc71;
  --red:   #e74c3c;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg);font-family:'Noto Serif TC',serif;color:var(--tl);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  background-image:radial-gradient(ellipse at 20% 20%,rgba(212,168,67,.08) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 80%,rgba(192,57,43,.06) 0%,transparent 60%);
}

/* ── Header ── */
header{width:100%;text-align:center;padding:16px 16px 8px}
header::after{content:'';display:block;margin:8px auto 0;width:60px;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.ttl{font-family:'ZCOOL XiaoWei',serif;font-size:2rem;letter-spacing:.3em;
  background:linear-gradient(135deg,var(--goldf),var(--gold),#b8860b);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:.68rem;letter-spacing:.2em;color:var(--td);margin-top:2px}

/* ── Nav Tabs ── */
.nav-tabs{display:flex;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:10px;overflow:hidden;margin:8px 0 6px;width:calc(100% - 24px);max-width:500px}
.nav-tab{flex:1;padding:9px 4px;background:none;border:none;color:var(--td);
  font-family:'Noto Serif TC',serif;font-size:.78rem;cursor:pointer;transition:all .2s}
.nav-tab.active{background:rgba(212,168,67,.2);color:var(--goldf)}

/* ── GAME VIEW ── */
#gameView{width:100%;display:flex;flex-direction:column;align-items:center}

/* mode & diff bars */
.mode-bar{display:flex;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:8px;overflow:hidden;margin-bottom:5px}
.mode-btn{padding:7px 16px;background:none;border:none;color:var(--td);
  font-family:'Noto Serif TC',serif;font-size:.78rem;cursor:pointer;transition:all .2s}
.mode-btn.active{background:rgba(212,168,67,.2);color:var(--goldf)}

.diff-bar{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:4px 10px;margin-bottom:5px}
.diff-bar.hidden{display:none}
.diff-lbl{font-size:.68rem;color:var(--td);margin-right:2px}
.diff-btn{padding:4px 12px;border:1px solid transparent;border-radius:6px;background:none;
  font-family:'Noto Serif TC',serif;font-size:.7rem;cursor:pointer;transition:all .2s;color:var(--td)}
.diff-btn.d-easy  {background:rgba(39,174,96,.2); color:#2ecc71;border-color:rgba(39,174,96,.4)}
.diff-btn.d-normal{background:rgba(241,196,15,.2);color:#f1c40f;border-color:rgba(241,196,15,.4)}
.diff-btn.d-hard  {background:rgba(192,57,43,.2); color:#e74c3c;border-color:rgba(192,57,43,.4)}

/* score bar */
.score-bar{display:flex;align-items:center;justify-content:center;gap:12px;margin:3px 0;
  padding:7px 20px;background:rgba(255,255,255,.04);border:1px solid rgba(212,168,67,.2);border-radius:50px}
.pi{display:flex;align-items:center;gap:8px;padding:3px 10px;border-radius:30px;transition:all .3s}
.pi.active{background:rgba(212,168,67,.15);box-shadow:0 0 12px rgba(212,168,67,.2)}
.sd{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.2)}
.sd.b{background:radial-gradient(circle at 35% 35%,#555,#111)}
.sd.w{background:radial-gradient(circle at 35% 35%,#fff,#ccc)}
.pn{font-size:.8rem}
.ps{font-size:1rem;font-weight:700;color:var(--gold)}
.sep{color:var(--td)}

/* ── 三欄主佈局 ── */
.game-main{display:flex;align-items:flex-start;justify-content:center;gap:8px;
  width:100%;padding:4px 6px}

/* 左欄按鈕 */
.side-L{display:flex;flex-direction:column;gap:7px;width:72px;flex-shrink:0;padding-top:6px}
.sbtn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px;
  border:none;border-radius:10px;font-family:'Noto Serif TC',serif;font-size:.6rem;
  letter-spacing:.03em;cursor:pointer;transition:all .2s;width:100%}
.sbtn .ico{font-size:1.2rem;line-height:1}
.sbtn-new {background:linear-gradient(135deg,var(--gold),#b8860b);color:#1a0e00;font-weight:700;
  box-shadow:0 3px 10px rgba(212,168,67,.25)}
.sbtn-new:hover{transform:translateY(-1px)}
.sbtn-undo{background:rgba(255,255,255,.07);color:var(--tl);border:1px solid rgba(255,255,255,.12)}
.sbtn-undo:hover{background:rgba(255,255,255,.13)}
.sbtn-hint{background:linear-gradient(135deg,rgba(52,152,219,.3),rgba(41,128,185,.3));
  color:var(--blue);border:1px solid rgba(52,152,219,.4)}
.sbtn-hint:hover{background:linear-gradient(135deg,rgba(52,152,219,.45),rgba(41,128,185,.45))}
.sbtn-clr {background:rgba(192,57,43,.18);color:var(--red);border:1px solid rgba(192,57,43,.3)}
.sbtn-clr:hover{background:rgba(192,57,43,.28)}

/* 中欄棋盤 */
.board-wrap{flex-shrink:0}
.board-outer{background:linear-gradient(145deg,var(--board),var(--bdk));border-radius:8px;padding:12px;
  box-shadow:0 16px 50px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.15),
    0 0 0 3px var(--bsh),0 0 0 5px rgba(0,0,0,.4)}
#board{display:block;cursor:crosshair}

/* 右欄資訊 */
.side-R{display:flex;flex-direction:column;gap:7px;width:110px;flex-shrink:0;padding-top:6px}
.turn-box{background:rgba(255,255,255,.04);border:1px solid rgba(212,168,67,.2);
  border-radius:10px;padding:10px 8px;text-align:center}
.turn-stone{width:24px;height:24px;border-radius:50%;margin:0 auto 5px;
  border:2px solid rgba(255,255,255,.2);transition:all .3s}
.turn-stone.b{background:radial-gradient(circle at 35% 35%,#555,#111)}
.turn-stone.w{background:radial-gradient(circle at 35% 35%,#fff,#ccc)}
.turn-lbl{font-size:.65rem;color:var(--goldf);letter-spacing:.06em;
  animation:pulse 1.5s ease-in-out infinite}
.turn-name{font-size:.72rem;font-weight:700;color:var(--tl);margin-top:2px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* hint card */
.hint-card{background:linear-gradient(135deg,rgba(52,152,219,.12),rgba(41,128,185,.08));
  border:1px solid rgba(52,152,219,.35);border-radius:10px;padding:9px;
  animation:cardIn .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes cardIn{from{transform:translateY(8px) scale(.95);opacity:0}to{transform:none;opacity:1}}
.hc-hdr{display:flex;align-items:center;gap:5px;margin-bottom:5px}
.hc-ico{font-size:.95rem}
.hc-lbl{flex:1;font-size:.7rem;font-weight:700;color:var(--blue)}
.hc-cls{background:none;border:none;color:var(--td);font-size:.8rem;cursor:pointer;padding:1px 4px}
.hc-cls:hover{color:var(--tl)}
.hc-reason{font-size:.68rem;line-height:1.6;color:var(--tl);margin-bottom:5px}
.hc-tags{display:flex;gap:4px;flex-wrap:wrap}
.htag{font-size:.58rem;padding:2px 6px;border-radius:8px;font-weight:700}
.ht-win  {background:rgba(231,76,60,.25); color:var(--red)}
.ht-block{background:rgba(39,174,96,.25); color:var(--green)}
.ht-atk  {background:rgba(241,196,15,.25);color:#f1c40f}
.ht-pos  {background:rgba(52,152,219,.25);color:var(--blue)}

.empty-hint{background:rgba(255,255,255,.03);border:1px dashed rgba(255,255,255,.1);
  border-radius:10px;padding:11px 7px;text-align:center;font-size:.63rem;color:var(--td);line-height:1.6}
.empty-hint .ico{font-size:1.3rem;display:block;margin-bottom:4px;opacity:.5}

/* 手機版 */
@media(max-width:580px){
  .game-main{flex-direction:column;align-items:center;gap:5px;padding:0 4px}
  .side-L{flex-direction:row;width:auto;padding-top:0;flex-wrap:wrap;justify-content:center;gap:5px}
  .sbtn{flex-direction:row;width:auto;padding:7px 11px;font-size:.68rem}
  .sbtn .ico{font-size:.9rem}
  .side-R{flex-direction:row;width:100%;padding-top:0;justify-content:center;flex-wrap:wrap;gap:5px}
  .turn-box{display:flex;align-items:center;gap:7px;padding:5px 11px;text-align:left}
  .turn-stone{margin:0;width:18px;height:18px}
  .hint-card{flex:1;min-width:180px}
  .empty-hint{display:none}
}

/* ── Win overlay ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  backdrop-filter:blur(6px);z-index:200;align-items:center;justify-content:center}
.overlay.show{display:flex}
.win-card{background:linear-gradient(135deg,var(--bg2),#0e0906);border:1px solid rgba(212,168,67,.4);
  border-radius:16px;padding:34px 42px;text-align:center;
  box-shadow:0 24px 80px rgba(0,0,0,.8);animation:cardIn .4s cubic-bezier(.34,1.56,.64,1)}
.we{font-size:2.8rem;margin-bottom:9px}
.wt{font-family:'ZCOOL XiaoWei',serif;font-size:1.6rem;letter-spacing:.3em;
  background:linear-gradient(135deg,var(--goldf),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:5px}
.ws{color:var(--td);font-size:.8rem;margin-bottom:22px}
.wbtns{display:flex;gap:10px;justify-content:center}
.btn{padding:9px 18px;border:none;border-radius:6px;font-family:'Noto Serif TC',serif;
  font-size:.82rem;letter-spacing:.08em;cursor:pointer;transition:all .2s}
.btn-p{background:linear-gradient(135deg,var(--gold),#b8860b);color:#1a0e00;font-weight:700;
  box-shadow:0 4px 12px rgba(212,168,67,.3)}
.btn-p:hover{transform:translateY(-1px)}
.btn-s{background:rgba(255,255,255,.07);color:var(--tl);border:1px solid rgba(255,255,255,.12)}
.btn-s:hover{background:rgba(255,255,255,.12)}

/* ── TUTORIAL VIEW ── */
#tutorialView{width:100%;max-width:480px;padding:0 12px 40px;display:none;flex-direction:column}
.prog-wrap{margin:6px 0 12px}
.prog-lbl{font-size:.7rem;color:var(--td);margin-bottom:4px;display:flex;justify-content:space-between}
.prog-bar{height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--goldf));
  border-radius:2px;transition:width .5s}
.cat-pills{display:flex;gap:7px;flex-wrap:wrap;margin:0 0 11px}
.cat-pill{padding:5px 13px;border-radius:20px;border:1px solid rgba(212,168,67,.3);
  background:rgba(255,255,255,.04);color:var(--td);font-size:.73rem;cursor:pointer;
  transition:all .2s;font-family:'Noto Serif TC',serif}
.cat-pill.active{background:rgba(212,168,67,.2);color:var(--goldf);border-color:var(--gold)}
.lesson-list{display:flex;flex-direction:column;gap:9px}
.lcard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:12px;padding:13px 15px;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;gap:11px}
.lcard:hover{background:rgba(212,168,67,.08);border-color:rgba(212,168,67,.3)}
.lcard.done{border-left:3px solid var(--green)}
.lico{font-size:1.5rem;flex-shrink:0}
.lmeta{flex:1}
.ltitle{font-size:.88rem;font-weight:700;margin-bottom:2px}
.ldesc{font-size:.7rem;color:var(--td);line-height:1.4}
.lbadge{font-size:.62rem;padding:2px 7px;border-radius:10px;flex-shrink:0}
.lb-basic{background:rgba(39,174,96,.2); color:#2ecc71}
.lb-mid  {background:rgba(241,196,15,.2);color:#f1c40f}
.lb-adv  {background:rgba(192,57,43,.2); color:var(--red)}

/* ── Lesson Modal ── */
.lmodal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);
  backdrop-filter:blur(8px);z-index:300;overflow-y:auto}
.lmodal.show{display:block}
.lmodal-inner{min-height:100vh;padding:18px 15px 60px;max-width:480px;margin:0 auto}
.mhdr{display:flex;align-items:center;gap:9px;margin-bottom:13px}
.mback{background:rgba(255,255,255,.08);border:none;color:var(--tl);border-radius:8px;
  padding:7px 13px;font-family:'Noto Serif TC',serif;font-size:.8rem;cursor:pointer}
.mtitle{font-family:'ZCOOL XiaoWei',serif;font-size:1.15rem;letter-spacing:.12em}
#demoCanvas{display:block;margin:10px auto;border-radius:8px;max-width:100%}
.step-nav{display:flex;align-items:center;justify-content:space-between;margin:9px 0;gap:7px}
.sinfo{flex:1;text-align:center;font-size:.73rem;color:var(--td)}
.sdots{display:flex;gap:5px;justify-content:center;margin-bottom:3px}
.sdot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2);transition:all .2s}
.sdot.active{background:var(--gold);transform:scale(1.3)}
.step-btn{padding:7px 13px;border:1px solid rgba(212,168,67,.3);background:rgba(212,168,67,.1);
  color:var(--goldf);border-radius:8px;font-family:'Noto Serif TC',serif;font-size:.77rem;cursor:pointer}
.step-btn:disabled{opacity:.3;cursor:default}
.step-btn:not(:disabled):hover{background:rgba(212,168,67,.2)}
.exbox{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:10px;padding:13px;margin:7px 0}
.extitle{font-size:.85rem;font-weight:700;color:var(--goldf);margin-bottom:7px}
.exbody{font-size:.8rem;line-height:1.85;color:var(--tl)}
.exbody .tag{display:inline-block;padding:1px 7px;border-radius:10px;font-size:.7rem;margin:2px;vertical-align:middle}
.tag-a{background:rgba(192,57,43,.3);color:var(--red)}
.tag-d{background:rgba(39,174,96,.3); color:var(--green)}
.tag-k{background:rgba(212,168,67,.25);color:var(--goldf)}
.tipbox{background:rgba(212,168,67,.07);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;
  padding:11px 13px;margin:7px 0;font-size:.78rem;line-height:1.7;color:var(--td)}
.tipbox strong{color:var(--goldf)}
.comp-btn{width:100%;padding:12px;margin-top:16px;border:none;border-radius:10px;
  background:linear-gradient(135deg,var(--gold),#b8860b);color:#1a0e00;
  font-family:'Noto Serif TC',serif;font-size:.9rem;font-weight:700;letter-spacing:.1em;cursor:pointer}
.comp-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(212,168,67,.3)}
</style>
</head>
<body>

<header>
  <div class="ttl">五子棋</div>
  <div class="sub">GOMOKU · 連珠</div>
</header>

<div class="nav-tabs">
  <button class="nav-tab active" id="tabGame"     onclick="switchTab('game')">♟ 對弈</button>
  <button class="nav-tab"        id="tabTutorial" onclick="switchTab('tutorial')">📖 教學</button>
</div>

<!-- ══ GAME VIEW ══ -->
<div id="gameView">
  <div class="mode-bar">
    <button class="mode-btn" id="modeHuman" onclick="setMode('human')">👥 雙人對戰</button>
    <button class="mode-btn active" id="modeAI" onclick="setMode('ai')">🤖 人機對戰</button>
  </div>
  <div class="diff-bar" id="diffBar">
    <span class="diff-lbl">難度：</span>
    <button class="diff-btn d-easy"  id="dEasy"   onclick="setDiff('easy')">🌱 新手</button>
    <button class="diff-btn"         id="dNormal"  onclick="setDiff('normal')">⚔️ 正常</button>
    <button class="diff-btn"         id="dHard"    onclick="setDiff('hard')">🔥 高手</button>
  </div>
  <div class="score-bar">
    <div class="pi" id="p1i">
      <div class="sd b"></div>
      <span class="pn">黑子</span>
      <span class="ps" id="s1">0</span>
    </div>
    <span class="sep">—</span>
    <div class="pi" id="p2i">
      <div class="sd w"></div>
      <span class="pn" id="p2n">AI</span>
      <span class="ps" id="s2">0</span>
    </div>
  </div>

  <div class="game-main">
    <!-- 左欄 -->
    <div class="side-L">
      <button class="sbtn sbtn-new"  onclick="newGame()"><span class="ico">♟</span>新局</button>
      <button class="sbtn sbtn-undo" onclick="undoMove()"><span class="ico">↩</span>悔棋</button>
      <button class="sbtn sbtn-hint" id="hintBtn" onclick="showHint()"><span class="ico">💡</span>建議</button>
      <button class="sbtn sbtn-clr"  onclick="resetScore()"><span class="ico">🗑</span>清除分數</button>
    </div>

    <!-- 中欄棋盤 -->
    <div class="board-wrap">
      <div class="board-outer">
        <canvas id="board"></canvas>
      </div>
    </div>

    <!-- 右欄 -->
    <div class="side-R">
      <div class="turn-box">
        <div class="turn-stone b" id="tstone"></div>
        <div class="turn-lbl">落子中</div>
        <div class="turn-name" id="tname">黑子</div>
      </div>
      <div class="hint-card" id="hintCard" style="display:none">
        <div class="hc-hdr">
          <span class="hc-ico" id="hIco">💡</span>
          <span class="hc-lbl" id="hLbl">建議落點</span>
          <button class="hc-cls" onclick="clearHint()">✕</button>
        </div>
        <div class="hc-reason" id="hReason"></div>
        <div class="hc-tags"   id="hTags"></div>
      </div>
      <div class="empty-hint" id="emptyHint">
        <span class="ico">💡</span>不知道怎麼下？<br>按左側「建議」<br>AI幫你分析！
      </div>
    </div>
  </div>
</div>

<!-- ══ TUTORIAL VIEW ══ -->
<div id="tutorialView">
  <div class="prog-wrap">
    <div class="prog-lbl"><span>學習進度</span><span id="progTxt">0 / 12 完成</span></div>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>
  <div class="cat-pills">
    <button class="cat-pill active" onclick="filterCat('all',this)">全部</button>
    <button class="cat-pill" onclick="filterCat('basic',this)">基礎棋步</button>
    <button class="cat-pill" onclick="filterCat('formation',this)">攻擊棋形</button>
    <button class="cat-pill" onclick="filterCat('defense',this)">防守策略</button>
    <button class="cat-pill" onclick="filterCat('opening',this)">開局棋陣</button>
  </div>
  <div class="lesson-list" id="lessonList"></div>
</div>

<!-- ══ LESSON MODAL ══ -->
<div class="lmodal" id="lModal">
  <div class="lmodal-inner">
    <div class="mhdr">
      <button class="mback" onclick="closeLesson()">← 返回</button>
      <div class="mtitle" id="mTitle"></div>
    </div>
    <canvas id="demoCanvas"></canvas>
    <div class="step-nav">
      <button class="step-btn" id="prevBtn" onclick="prevStep()">上一步</button>
      <div class="sinfo">
        <div class="sdots" id="stepDots"></div>
        <span id="stepTxt">步驟 1</span>
      </div>
      <button class="step-btn" id="nextBtn" onclick="nextStep()">下一步</button>
    </div>
    <div class="exbox">
      <div class="extitle" id="exTitle"></div>
      <div class="exbody"  id="exBody"></div>
    </div>
    <div class="tipbox" id="tipBox"></div>
    <button class="comp-btn" id="compBtn" onclick="completeLesson()">✓ 標記為已學習</button>
  </div>
</div>

<!-- ══ WIN OVERLAY ══ -->
<div class="overlay" id="overlay">
  <div class="win-card">
    <div class="we" id="wEmoji">🏆</div>
    <div class="wt"  id="wTitle">勝利</div>
    <div class="ws"  id="wSub">恭喜！</div>
    <div class="wbtns">
      <button class="btn btn-p" onclick="newGame()">再來一局</button>
      <button class="btn btn-s" onclick="closeOverlay()">查看棋盤</button>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════════
   LESSON DATA
════════════════════════════════════════ */

  dctx.strokeStyle='rgba(120,70,20,.12)';dctx.lineWidth=1;
  for(let i=0;i<DSC;i+=5){dctx.beginPath();dctx.moveTo(0,i);dctx.lineTo(DSC,i);dctx.stroke()}
  dctx.strokeStyle='#5c3d1a';dctx.lineWidth=.7;
  for(let i=0;i<DSIZ;i++){
    const x=DPAD+i*DZ,y=DPAD+i*DZ;
    dctx.beginPath();dctx.moveTo(x,DPAD);dctx.lineTo(x,DPAD+(DSIZ-1)*DZ);dctx.stroke();
    dctx.beginPath();dctx.moveTo(DPAD,y);dctx.lineTo(DPAD+(DSIZ-1)*DZ,y);dctx.stroke();
  }
  dctx.fillStyle='#5c3d1a';dctx.beginPath();dctx.arc(DPAD+4*DZ,DPAD+4*DZ,3,0,Math.PI*2);dctx.fill();
  hl.forEach(([r,c])=>{
    const[br,bc]=mapC(r,c);if(br<0||br>=DSIZ||bc<0||bc>=DSIZ)return;
    const x=DPAD+bc*DZ,y=DPAD+br*DZ;
    dctx.strokeStyle='rgba(240,200,96,.85)';dctx.lineWidth=2;dctx.setLineDash([4,3]);
    dctx.beginPath();dctx.arc(x,y,DZ*.38,0,Math.PI*2);dctx.stroke();dctx.setLineDash([]);
    dctx.fillStyle='rgba(240,200,96,.9)';dctx.font=`${DZ*.38}px serif`;
    dctx.textAlign='center';dctx.textBaseline='middle';dctx.fillText('★',x,y);
  });
  stones.forEach(([r,c,p])=>{
    const[br,bc]=mapC(r,c);if(br<0||br>=DSIZ||bc<0||bc>=DSIZ)return;
    const x=DPAD+bc*DZ,y=DPAD+br*DZ,rad=DZ*.42;
    const g=dctx.createRadialGradient(x-rad*.3,y-rad*.3,rad*.05,x,y,rad);
    if(p==='b'){g.addColorStop(0,'#666');g.addColorStop(.4,'#222');g.addColorStop(1,'#050505')}
    else{g.addColorStop(0,'#fff');g.addColorStop(.5,'#e8e0d5');g.addColorStop(1,'#b0a898')}
    dctx.shadowColor='rgba(0,0,0,.4)';dctx.shadowBlur=4;dctx.shadowOffsetX=1;dctx.shadowOffsetY=2;
    dctx.fillStyle=g;dctx.beginPath();dctx.arc(x,y,rad,0,Math.PI*2);dctx.fill();
    dctx.shadowColor='transparent';
    if(p==='w'){
      const sh=dctx.createRadialGradient(x-rad*.35,y-rad*.35,0,x-rad*.2,y-rad*.2,rad*.5);
      sh.addColorStop(0,'rgba(255,255,255,.6)');sh.addColorStop(1,'rgba(255,255,255,0)');
      dctx.fillStyle=sh;dctx.beginPath();dctx.arc(x,y,rad,0,Math.PI*2);dctx.fill();
    }
  });
}

function renderLessons(){
  const list=document.getElementById('lessonList');list.innerHTML='';
  const arr=curCat==='all'?LESSONS:LESSONS.filter(l=>l.cat===curCat);
  arr.forEach(l=>{
    const done=doneL.includes(l.id);
    const d=document.createElement('div');
    d.className='lcard'+(done?' done':'');
    d.innerHTML=`<div class="lico">${l.icon}</div>
      <div class="lmeta">
        <div class="ltitle">${l.title}${done?' <span style="color:var(--green)">✓</span>':''}</div>
        <div class="ldesc">${l.desc}</div>
      </div>
      <span class="lbadge lb-${l.badge}">${l.badgeText}</span>`;
    d.onclick=()=>openLesson(l);
    list.appendChild(d);
  });
  const tot=LESSONS.length,dn=doneL.length;
  document.getElementById('progTxt').textContent=`${dn} / ${tot} 完成`;
  document.getElementById('progFill').style.width=`${(dn/tot)*100}%`;
}

function filterCat(c,btn){
  curCat=c;
  document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');renderLessons();
}

function openLesson(l){
  curLesson=l;curStep=0;
  document.getElementById('mTitle').textContent=l.title;
  document.getElementById('lModal').classList.add('show');
  document.body.style.overflow='hidden';
  document.getElementById('compBtn').textContent=doneL.includes(l.id)?'✓ 已學習完成':'✓ 標記為已學習';
  renderStep();
}

function closeLesson(){
  document.getElementById('lModal').classList.remove('show');
  document.body.style.overflow='';renderLessons();
}

function renderStep(){
  const l=curLesson,s=l.steps[curStep],tot=l.steps.length;
  const dots=document.getElementById('stepDots');dots.innerHTML='';
  for(let i=0;i<tot;i++){const d=document.createElement('div');d.className='sdot'+(i===curStep?' active':'');dots.appendChild(d)}
  document.getElementById('stepTxt').textContent=`步驟 ${curStep+1} / ${tot}`;
  document.getElementById('prevBtn').disabled=curStep===0;
  document.getElementById('nextBtn').textContent=curStep===tot-1?'完成 ✓':'下一步';
  document.getElementById('exTitle').textContent=s.title;
  document.getElementById('exBody').innerHTML=s.body;
  document.getElementById('tipBox').innerHTML=s.tip?`💡 <strong>小提示</strong><br>${s.tip}`:'';
  drawDemo(s.board||[],s.hl||[]);
}

function prevStep(){if(curStep>0){curStep--;renderStep()}}
function nextStep(){if(curStep<curLesson.steps.length-1){curStep++;renderStep()}else completeLesson()}
function completeLesson(){
  if(!doneL.includes(curLesson.id)){doneL.push(curLesson.id);localStorage.setItem('gm_lessons',JSON.stringify(doneL))}
  document.getElementById('compBtn').textContent='✓ 已學習完成';
  setTimeout(closeLesson,400);
}

/* ════════════════════════════════════════
   GAME
════════════════════════════════════════ */
const BS=15;
const SZ=window.innerWidth<420?Math.floor((window.innerWidth-170)/14):30;
const PAD=SZ;
const CSZ=PAD*2+SZ*(BS-1);

let gboard=[], cur=1, gover=false, hist=[], scores={1:0,2:0};
let mode='ai', aiOK=false, diff='easy';
let gen=0; // 局次編號，每次 newGame 遞增，讓舊的 setTimeout 自動失效

const cv=document.getElementById('board');
const cx=cv.getContext('2d');
cv.width=cv.height=CSZ;
cv.style.width=CSZ+'px';
cv.style.height=CSZ+'px';

function initBoard(){
  gen++; // 新局，讓所有舊的 setTimeout aiMove 失效
  gboard=Array.from({length:BS},()=>Array(BS).fill(0));
  cur=1;gover=false;aiOK=false;hist=[];
  updTurn();drawG();
}

function drawG(){
  cx.clearRect(0,0,CSZ,CSZ);
  cx.fillStyle='#c8933a';cx.fillRect(0,0,CSZ,CSZ);
  cx.strokeStyle='rgba(120,70,20,.12)';cx.lineWidth=1;
  for(let i=0;i<CSZ;i+=6){cx.beginPath();cx.moveTo(0,i+Math.sin(i*.05)*2);cx.lineTo(CSZ,i+Math.sin(i*.05+1)*2);cx.stroke()}
  cx.strokeStyle='#5c3d1a';cx.lineWidth=.8;
  for(let i=0;i<BS;i++){
    const x=PAD+i*SZ,y=PAD+i*SZ;
    cx.beginPath();cx.moveTo(x,PAD);cx.lineTo(x,PAD+(BS-1)*SZ);cx.stroke();
    cx.beginPath();cx.moveTo(PAD,y);cx.lineTo(PAD+(BS-1)*SZ,y);cx.stroke();
  }
  [[3,3],[3,7],[3,11],[7,3],[7,7],[7,11],[11,3],[11,7],[11,11]].forEach(([r,c])=>{
    cx.fillStyle='#5c3d1a';cx.beginPath();cx.arc(PAD+c*SZ,PAD+r*SZ,3,0,Math.PI*2);cx.fill();
  });
  for(let r=0;r<BS;r++)for(let c=0;c<BS;c++)if(gboard[r][c])drawSt(r,c,gboard[r][c]);
  if(hist.length>0){
    const lh=hist[hist.length-1];
    cx.strokeStyle=lh.p===1?'rgba(255,200,0,.9)':'rgba(255,100,0,.9)';
    cx.lineWidth=2;cx.beginPath();cx.arc(PAD+lh.c*SZ,PAD+lh.r*SZ,SZ*.18,0,Math.PI*2);cx.stroke();
  }
}

function drawSt(r,c,p){
  const x=PAD+c*SZ,y=PAD+r*SZ,rad=SZ*.44;
  const g=cx.createRadialGradient(x-rad*.3,y-rad*.3,rad*.05,x,y,rad);
  if(p===1){g.addColorStop(0,'#666');g.addColorStop(.4,'#222');g.addColorStop(1,'#050505')}
  else{g.addColorStop(0,'#fff');g.addColorStop(.5,'#e8e0d5');g.addColorStop(1,'#b0a898')}
  cx.shadowColor='rgba(0,0,0,.5)';cx.shadowBlur=5;cx.shadowOffsetX=2;cx.shadowOffsetY=3;
  cx.fillStyle=g;cx.beginPath();cx.arc(x,y,rad,0,Math.PI*2);cx.fill();cx.shadowColor='transparent';
  if(p===2){
    const sh=cx.createRadialGradient(x-rad*.35,y-rad*.35,0,x-rad*.2,y-rad*.2,rad*.5);
    sh.addColorStop(0,'rgba(255,255,255,.6)');sh.addColorStop(1,'rgba(255,255,255,0)');
    cx.fillStyle=sh;cx.beginPath();cx.arc(x,y,rad,0,Math.PI*2);cx.fill();
  }
}

function hlWin(cells){
  cells.forEach(([r,c])=>{cx.strokeStyle='#f0c860';cx.lineWidth=3;cx.beginPath();cx.arc(PAD+c*SZ,PAD+r*SZ,SZ*.44,0,Math.PI*2);cx.stroke()});
}

/* ── click & touch ── */
cv.addEventListener('click',e=>{
  if(gover||aiOK)return;
  if(mode==='ai'&&cur===2)return;
  const rect=cv.getBoundingClientRect();
  const sx=cv.width/rect.width,sy=cv.height/rect.height;
  const px=(e.clientX-rect.left)*sx,py=(e.clientY-rect.top)*sy;
  const c=Math.round((px-PAD)/SZ),r=Math.round((py-PAD)/SZ);
  if(r<0||r>=BS||c<0||c>=BS)return;
  place(r,c);
});
cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(gover||aiOK)return;
  if(mode==='ai'&&cur===2)return;
  const t=e.touches[0],rect=cv.getBoundingClientRect();
  const sx=cv.width/rect.width,sy=cv.height/rect.height;
  const px=(t.clientX-rect.left)*sx,py=(t.clientY-rect.top)*sy;
  const c=Math.round((px-PAD)/SZ),r=Math.round((py-PAD)/SZ);
  if(r<0||r>=BS||c<0||c>=BS)return;
  place(r,c);
},{passive:false});

function place(r,c){
  if(gboard[r][c])return;
  clearHint();
  gboard[r][c]=cur;hist.push({r,c,p:cur});drawG();
  const w=chkWin(r,c);
  if(w){hlWin(w);showWin(cur);return}
  if(hist.length===BS*BS){showDraw();return}
  cur=cur===1?2:1;updTurn();
  if(mode==='ai'&&cur===2){
    const g=gen; // 記住當前局次
    setTimeout(()=>{ if(gen===g) aiMove(); },280); // 只有局次相同才執行
  }
}

function chkWin(r,c){
  const p=gboard[r][c];
  for(const[dr,dc]of[[0,1],[1,0],[1,1],[1,-1]]){
    const cl=[[r,c]];
    for(let d=1;d<5;d++){const nr=r+dr*d,nc=c+dc*d;if(nr<0||nr>=BS||nc<0||nc>=BS||gboard[nr][nc]!==p)break;cl.push([nr,nc])}
    for(let d=1;d<5;d++){const nr=r-dr*d,nc=c-dc*d;if(nr<0||nr>=BS||nc<0||nc>=BS||gboard[nr][nc]!==p)break;cl.push([nr,nc])}
    if(cl.length>=5)return cl;
  }
  return null;
}

/* ── AI ── */
function getCands(){
  const res=[],vis=Array.from({length:BS},()=>Array(BS).fill(false));
  for(let r=0;r<BS;r++)for(let c=0;c<BS;c++){
    if(!gboard[r][c])continue;
    for(let dr=-2;dr<=2;dr++)for(let dc=-2;dc<=2;dc++){
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<BS&&nc>=0&&nc<BS&&!gboard[nr][nc]&&!vis[nr][nc]){vis[nr][nc]=true;res.push([nr,nc])}
    }
  }
  return res.length?res:[[7,7]];
}

function evalB(p){
  let tot=0;
  for(let r=0;r<BS;r++)for(let c=0;c<BS;c++){
    if(gboard[r][c]!==p)continue;
    for(const[dr,dc]of[[0,1],[1,0],[1,1],[1,-1]]){
      let cnt=1,oe=0;
      for(let d=1;d<5;d++){const nr=r+dr*d,nc=c+dc*d;if(nr<0||nr>=BS||nc<0||nc>=BS)break;if(gboard[nr][nc]===p)cnt++;else{if(!gboard[nr][nc])oe++;break}}
      for(let d=1;d<5;d++){const nr=r-dr*d,nc=c-dc*d;if(nr<0||nr>=BS||nc<0||nc>=BS)break;if(gboard[nr][nc]===p)cnt++;else{if(!gboard[nr][nc])oe++;break}}
      tot+=[0,1,10,100,1000,100000][Math.min(cnt,5)]*(oe>0?oe:.5);
    }
  }
  return tot;
}

function aiMove(){
  aiOK=true;
  const moves=getCands();
  let best=null,bs=-Infinity;

  if(diff==='easy'){
    for(const[r,c]of moves){if(gboard[r][c])continue;gboard[r][c]=2;const w=chkWin(r,c);gboard[r][c]=0;if(w){aiOK=false;place(r,c);return}}
    for(const[r,c]of moves){if(gboard[r][c])continue;gboard[r][c]=1;const w=chkWin(r,c);gboard[r][c]=0;if(w){aiOK=false;place(r,c);return}}
    const pool=moves.filter(([r,c])=>!gboard[r][c]).slice(0,8);
    const pick=pool[Math.floor(Math.random()*pool.length)];
    aiOK=false;if(pick)place(pick[0],pick[1]);

  }else if(diff==='normal'){
    for(const[r,c]of moves){
      if(gboard[r][c])continue;
      gboard[r][c]=2;const a=evalB(2);gboard[r][c]=0;
      gboard[r][c]=1;const d=evalB(1);gboard[r][c]=0;
      const sc=a*1.1+d;if(sc>bs){bs=sc;best=[r,c]}
    }
    aiOK=false;if(best)place(best[0],best[1]);

  }else{
    for(const[r,c]of moves){
      if(gboard[r][c])continue;
      gboard[r][c]=2;if(chkWin(r,c)){gboard[r][c]=0;aiOK=false;place(r,c);return}gboard[r][c]=0;
      gboard[r][c]=1;if(chkWin(r,c)){gboard[r][c]=0;best=[r,c];bs=Infinity;break}gboard[r][c]=0;
      gboard[r][c]=2;const ma=evalB(2);
      let ob=0;getCands().slice(0,15).forEach(([or,oc])=>{if(gboard[or][oc])return;gboard[or][oc]=1;const s=evalB(1);if(s>ob)ob=s;gboard[or][oc]=0});
      gboard[r][c]=0;
      gboard[r][c]=1;const md=evalB(1);gboard[r][c]=0;
      const sc=ma*1.2-ob*.8+md;if(sc>bs){bs=sc;best=[r,c]}
    }
    aiOK=false;if(best)place(best[0],best[1]);
  }
}

/* ── Hint Engine ── */
let hPos=null,hAnim=null,hPhase=0;

function getShape(r,c,p){
  gboard[r][c]=p;
  let l4=false,r4=false,l3=false,sc=0;
  for(const[dr,dc]of[[0,1],[1,0],[1,1],[1,-1]]){
    let cnt=1,oe=0;
    for(let d=1;d<5;d++){const nr=r+dr*d,nc=c+dc*d;if(nr<0||nr>=BS||nc<0||nc>=BS)break;if(gboard[nr][nc]===p)cnt++;else{if(!gboard[nr][nc])oe++;break}}
    for(let d=1;d<5;d++){const nr=r-dr*d,nc=c-dc*d;if(nr<0||nr>=BS||nc<0||nc>=BS)break;if(gboard[nr][nc]===p)cnt++;else{if(!gboard[nr][nc])oe++;break}}
    if(cnt>=4&&oe>=2)l4=true;if(cnt>=4&&oe===1)r4=true;if(cnt>=3&&oe>=2)l3=true;
    sc+=[0,1,10,100,1000,100000][Math.min(cnt,5)]*(oe>0?oe:.5);
  }
  gboard[r][c]=0;return{l4,r4,l3,sc};
}

function analyzeM(r,c,p){
  const op=p===1?2:1;
  gboard[r][c]=p;const iw=chkWin(r,c);gboard[r][c]=0;
  if(iw)return{score:1e6,lv:'win',desc:'落子此處可以直接連成五子獲勝！'};
  gboard[r][c]=op;const ow=chkWin(r,c);gboard[r][c]=0;
  if(ow)return{score:9e5,lv:'block',desc:'對手下一步即可連五，必須立即封堵！'};
  const my=getShape(r,c,p),op2=getShape(r,c,op);
  if(my.l4) return{score:5e5+my.sc, lv:'atk',  desc:'形成活四！對手無法同時封住兩端，下步可連五。'};
  if(op2.l4)return{score:4.8e5+op2.sc,lv:'block',desc:'對手即將形成活四，必須優先封堵！'};
  if(my.r4) return{score:3e5+my.sc, lv:'atk',  desc:'形成衝四，強迫對手回防，配合其他方向形成必勝局。'};
  if(op2.r4)return{score:2.8e5+op2.sc,lv:'block',desc:'對手即將形成衝四，搶先封堵可讓對手失去主動權。'};
  if(my.l3) return{score:1.5e5+my.sc,lv:'atk',  desc:'形成活三！兩端都有空間延伸，下步可嘗試形成活四或雙三。'};
  if(op2.l3)return{score:1.3e5+op2.sc,lv:'block',desc:'對手即將形成活三，及早封堵可壓制對手進攻節奏。'};
  const tot=my.sc*1.1+op2.sc;
  let desc='均衡落點，同時發展己方棋形並牽制對手。';
  if(my.sc>op2.sc*1.5)desc='進攻性落點，有利於建立己方連子棋形。';
  else if(op2.sc>my.sc*1.5)desc='防守性落點，有效壓制對手的棋形發展。';
  return{score:tot,lv:'pos',desc};
}

function getBestHint(){
  if(hist.length===0)return{r:7,c:7,lv:'pos',desc:'第一手走天元（棋盤正中央）是最穩固的開局，可向四面八方均衡發展。'};
  const moves=getCands();let best=null,br=null,bsc=-Infinity;
  for(const[r,c]of moves){
    if(gboard[r][c])continue;
    const res=analyzeM(r,c,cur);
    if(res.score>bsc){bsc=res.score;best=[r,c];br=res}
  }
  if(!best)return null;
  return{r:best[0],c:best[1],...br};
}

function showHint(){
  if(gover||aiOK)return;
  if(mode==='ai'&&cur===2)return;
  clearHint();
  const btn=document.getElementById('hintBtn');
  btn.innerHTML='<span class="ico">🔍</span>分析中…';btn.disabled=true;
  setTimeout(()=>{
    const h=getBestHint();
    btn.innerHTML='<span class="ico">💡</span>建議';btn.disabled=false;
    if(!h)return;
    hPos={r:h.r,c:h.c};
    const icons={win:'🏆',block:'🛡️',atk:'⚔️',pos:'💡'};
    const labels={win:'立即獲勝',block:'緊急防守',atk:'強力進攻',pos:'最佳落點'};
    const tcls={win:'ht-win',block:'ht-block',atk:'ht-atk',pos:'ht-pos'};
    document.getElementById('hIco').textContent=icons[h.lv];
    document.getElementById('hLbl').textContent=labels[h.lv];
    document.getElementById('hReason').textContent=h.desc;
    const col=String.fromCharCode(65+h.c),row=h.r+1;
    document.getElementById('hTags').innerHTML=
      `<span class="htag ${tcls[h.lv]}">${labels[h.lv]}</span>
       <span class="htag ht-pos">位置 ${col}${row}</span>`;
    document.getElementById('hintCard').style.display='block';
    const eh=document.getElementById('emptyHint');if(eh)eh.style.display='none';
    startHintAnim();
  },80);
}

function clearHint(){
  hPos=null;
  if(hAnim){cancelAnimationFrame(hAnim);hAnim=null}
  const card=document.getElementById('hintCard');if(card)card.style.display='none';
  const eh=document.getElementById('emptyHint');if(eh)eh.style.display='';
  const btn=document.getElementById('hintBtn');
  if(btn){btn.innerHTML='<span class="ico">💡</span>建議';btn.disabled=false}
  drawG();
}

function startHintAnim(){
  hPhase=0;
  function go(){
    if(!hPos){drawG();return}
    hPhase+=.06;drawG();
    const x=PAD+hPos.c*SZ,y=PAD+hPos.r*SZ;
    const alpha=.55+.45*Math.sin(hPhase),scale=1+.18*Math.sin(hPhase),rad=SZ*.44*scale;
    const gw=cx.createRadialGradient(x,y,0,x,y,rad*1.8);
    gw.addColorStop(0,`rgba(116,185,255,${alpha*.35})`);gw.addColorStop(1,'rgba(116,185,255,0)');
    cx.fillStyle=gw;cx.beginPath();cx.arc(x,y,rad*1.8,0,Math.PI*2);cx.fill();
    cx.strokeStyle=`rgba(116,185,255,${alpha})`;cx.lineWidth=3;
    cx.beginPath();cx.arc(x,y,rad,0,Math.PI*2);cx.stroke();
    const arm=SZ*.28;cx.lineWidth=2;
    [[0,-1],[0,1],[-1,0],[1,0]].forEach(([dx,dy])=>{
      cx.beginPath();cx.moveTo(x+dx*(rad+2),y+dy*(rad+2));cx.lineTo(x+dx*(rad+arm),y+dy*(rad+arm));cx.stroke();
    });
    cx.fillStyle=`rgba(116,185,255,${alpha})`;cx.beginPath();cx.arc(x,y,2.5,0,Math.PI*2);cx.fill();
    hAnim=requestAnimationFrame(go);
  }
  go();
}

/* ── Turn / Win / UI ── */
function updTurn(){
  const names=['','黑子',mode==='ai'?'AI（白子）':'白子'];
  const isB=cur===1;
  const ts=document.getElementById('tstone');if(ts)ts.className='turn-stone '+(isB?'b':'w');
  const tn=document.getElementById('tname');if(tn)tn.textContent=names[cur];
  document.getElementById('p1i').classList.toggle('active',cur===1);
  document.getElementById('p2i').classList.toggle('active',cur===2);
}

function showWin(p){
  gover=true;scores[p]++;
  document.getElementById('s'+p).textContent=scores[p];
  const names={1:'黑子',2:mode==='ai'?'AI（白子）':'白子'};
  document.getElementById('wEmoji').textContent=p===1?'⚫':'⚪';
  document.getElementById('wTitle').textContent=`${names[p]} 勝利！`;
  document.getElementById('wSub').textContent='恭喜連成五子！';
  setTimeout(()=>document.getElementById('overlay').classList.add('show'),600);
}

function showDraw(){
  gover=true;
  document.getElementById('wEmoji').textContent='🤝';
  document.getElementById('wTitle').textContent='平局';
  document.getElementById('wSub').textContent='棋盤已滿，雙方平手！';
  setTimeout(()=>document.getElementById('overlay').classList.add('show'),300);
}

function closeOverlay(){document.getElementById('overlay').classList.remove('show')}
function newGame(){closeOverlay();clearHint();initBoard()}
function undoMove(){
  if(gover||hist.length===0)return;
  clearHint();
  aiOK=false;

  if(mode==='ai'){
    // 人機模式：一次撤回「玩家+AI」各一手，確保輪回玩家
    // 先撤回最後一手（不管是誰的）
    const lh=hist.pop();gboard[lh.r][lh.c]=0;
    // 如果撤回的是 AI 的棋，再撤回玩家的棋
    if(lh.p===2&&hist.length>0){
      const ph=hist.pop();gboard[ph.r][ph.c]=0;
    }
    // 如果撤回的是玩家的棋（AI 還沒下），只撤一手就好
  }else{
    // 雙人模式：每次只撤一手
    const lh=hist.pop();gboard[lh.r][lh.c]=0;
  }

  // 重新計算輪次：歷史為空則黑子先，否則看最後一手是誰下的
  cur=hist.length===0?1:(hist[hist.length-1].p===1?2:1);
  drawG();updTurn();
}
function resetScore(){
  scores={1:0,2:0};
  document.getElementById('s1').textContent='0';
  document.getElementById('s2').textContent='0';
}

function setMode(m){
  mode=m;
  document.getElementById('modeHuman').classList.toggle('active',m==='human');
  document.getElementById('modeAI').classList.toggle('active',m==='ai');
  document.getElementById('p2n').textContent=m==='ai'?'AI':'白子';
  const db=document.getElementById('diffBar');if(db)db.classList.toggle('hidden',m==='human');
  newGame();
}

function setDiff(d){
  diff=d;
  ['easy','normal','hard'].forEach(k=>{
    const btn=document.getElementById('d'+k.charAt(0).toUpperCase()+k.slice(1));
    if(!btn)return;
    btn.className='diff-btn';
    if(k===d)btn.classList.add('d-'+k);
  });
  newGame();
}

/* ── Tab switch ── */
function switchTab(tab){
  document.getElementById('gameView').style.display    =tab==='game'    ?'flex':'none';
  document.getElementById('tutorialView').style.display=tab==='tutorial'?'flex':'none';
  document.getElementById('tabGame').classList.toggle('active',    tab==='game');
  document.getElementById('tabTutorial').classList.toggle('active',tab==='tutorial');
  if(tab==='tutorial')renderLessons();
}

/* ── Init ── */
initBoard();

/* ── Service Worker 註冊（PWA 離線支援） ── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('✅ SW 已註冊:', reg.scope))
      .catch(err => console.error('❌ SW 註冊失敗:', err));
  });
}
</script>
