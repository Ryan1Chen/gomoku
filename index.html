<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="五子棋">
  <meta name="theme-color" content="#1a1008">
  <link rel="manifest" href="manifest.json">
  <title>五子棋</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <style>
    :root {
      --board-color: #c8933a;
      --board-dark: #a0722a;
      --board-shadow: #7a5520;
      --bg-dark: #1a1008;
      --bg-mid: #2a1e0e;
      --gold: #d4a843;
      --gold-light: #f0c860;
      --red: #c0392b;
      --green: #27ae60;
      --text-light: #f5e6c8;
      --text-dim: #a08060;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg-dark);
      font-family: 'Noto Serif TC', serif;
      color: var(--text-light);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      overflow-x: hidden;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(212,168,67,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(192,57,43,0.06) 0%, transparent 60%);
    }

    header { width:100%; text-align:center; padding:18px 16px 8px; }
    header::after { content:''; display:block; margin:8px auto 0; width:60px; height:2px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent); }
    .title-main {
      font-family:'ZCOOL XiaoWei',serif; font-size:2rem; letter-spacing:0.3em;
      background:linear-gradient(135deg,var(--gold-light),var(--gold),#b8860b);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .title-sub { font-size:0.68rem; letter-spacing:0.2em; color:var(--text-dim); margin-top:2px; }

    .nav-tabs {
      display:flex; background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1); border-radius:10px;
      overflow:hidden; margin:10px 0 6px; width:calc(100% - 24px); max-width:420px;
    }
    .nav-tab {
      flex:1; padding:9px 4px; background:none; border:none;
      color:var(--text-dim); font-family:'Noto Serif TC',serif; font-size:0.78rem;
      cursor:pointer; letter-spacing:0.04em; transition:all 0.2s;
    }
    .nav-tab.active { background:rgba(212,168,67,0.2); color:var(--gold-light); }

    /* GAME */
    #gameView { width:100%; display:flex; flex-direction:column; align-items:center; }
    .mode-bar { display:flex; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
      border-radius:8px; overflow:hidden; margin-bottom:6px; }
    .mode-btn { padding:7px 16px; background:none; border:none; color:var(--text-dim);
      font-family:'Noto Serif TC',serif; font-size:0.78rem; cursor:pointer; transition:all 0.2s; }
    .mode-btn.active { background:rgba(212,168,67,0.2); color:var(--gold-light); }

    /* ── 難度選擇列 ── */
    .diff-bar {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; padding: 5px 10px;
      margin-bottom: 6px; transition: opacity 0.3s;
    }
    .diff-bar.hidden { opacity: 0.3; pointer-events: none; }
    .diff-label { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 0.05em; margin-right: 2px; }
    .diff-btn {
      padding: 5px 13px; border: 1px solid transparent;
      border-radius: 6px; background: none;
      font-family: 'Noto Serif TC', serif; font-size: 0.72rem;
      cursor: pointer; transition: all 0.2s; color: var(--text-dim);
      letter-spacing: 0.04em;
    }
    .diff-btn:hover { background: rgba(255,255,255,0.07); color: var(--text-light); }
    .diff-btn.active-easy   { background: rgba(39,174,96,0.2);  color: #2ecc71; border-color: rgba(39,174,96,0.4); }
    .diff-btn.active-normal { background: rgba(241,196,15,0.2); color: #f1c40f; border-color: rgba(241,196,15,0.4); }
    .diff-btn.active-hard   { background: rgba(192,57,43,0.2);  color: #e74c3c; border-color: rgba(192,57,43,0.4); }
    .score-bar { display:flex; align-items:center; justify-content:center; gap:12px; margin:4px 0;
      padding:8px 20px; background:rgba(255,255,255,0.04); border:1px solid rgba(212,168,67,0.2); border-radius:50px; }
    .player-info { display:flex; align-items:center; gap:8px; padding:4px 12px; border-radius:30px; transition:all 0.3s; }
    .player-info.active { background:rgba(212,168,67,0.15); box-shadow:0 0 12px rgba(212,168,67,0.2); }
    .stone-dot { width:18px; height:18px; border-radius:50%; border:2px solid rgba(255,255,255,0.2); }
    .stone-dot.black { background:radial-gradient(circle at 35% 35%,#555,#111); }
    .stone-dot.white { background:radial-gradient(circle at 35% 35%,#fff,#ccc); }
    .player-name { font-size:0.82rem; }
    .player-score { font-size:1.05rem; font-weight:700; color:var(--gold); }
    .score-sep { color:var(--text-dim); }
    .turn-indicator { font-size:0.7rem; color:var(--gold-light); text-align:center;
      height:16px; letter-spacing:0.1em; animation:pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    /* ── 三欄主佈局 ── */
    .game-main {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 4px 8px;
    }

    /* 左欄：按鈕區 */
    .side-controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-top: 8px;
      flex-shrink: 0;
      width: 76px;
    }
    .side-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 6px;
      border: none;
      border-radius: 10px;
      font-family: 'Noto Serif TC', serif;
      font-size: 0.62rem;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }
    .side-btn .btn-ico { font-size: 1.3rem; line-height: 1; }
    .side-btn-primary {
      background: linear-gradient(135deg, var(--gold), #b8860b);
      color: #1a0e00; font-weight: 700;
      box-shadow: 0 4px 12px rgba(212,168,67,0.25);
    }
    .side-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(212,168,67,0.35); }
    .side-btn-secondary {
      background: rgba(255,255,255,0.07);
      color: var(--text-light);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .side-btn-secondary:hover { background: rgba(255,255,255,0.13); }
    .side-btn-hint {
      background: linear-gradient(135deg, rgba(52,152,219,0.3), rgba(41,128,185,0.3));
      color: #74b9ff;
      border: 1px solid rgba(52,152,219,0.4);
    }
    .side-btn-hint:hover { background: linear-gradient(135deg, rgba(52,152,219,0.45), rgba(41,128,185,0.45)); }
    .side-btn-hint.thinking { animation: hintPulse 0.8s ease-in-out infinite; pointer-events: none; }
    .side-btn-danger {
      background: rgba(192,57,43,0.18);
      color: #e74c3c;
      border: 1px solid rgba(192,57,43,0.3);
    }
    .side-btn-danger:hover { background: rgba(192,57,43,0.28); }

    /* 中欄：棋盤 */
    .board-wrap { position:relative; margin:0; padding:4px; flex-shrink:0; }
    .board-outer { background:linear-gradient(145deg,var(--board-color),var(--board-dark));
      border-radius:8px; padding:14px;
      box-shadow:0 20px 60px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.15),
        0 0 0 3px var(--board-shadow),0 0 0 5px rgba(0,0,0,0.4); }
    canvas { display:block; cursor:pointer; border-radius:2px; }

    /* 右欄：說明區 */
    .side-info {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-top: 8px;
      flex-shrink: 0;
      width: 120px;
    }

    /* 輪次顯示（移入右欄） */
    .side-turn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(212,168,67,0.2);
      border-radius: 10px;
      padding: 10px 8px;
      text-align: center;
    }
    .side-turn-stone {
      width: 26px; height: 26px; border-radius: 50%;
      margin: 0 auto 6px;
      border: 2px solid rgba(255,255,255,0.2);
      transition: all 0.3s;
    }
    .side-turn-stone.black { background: radial-gradient(circle at 35% 35%,#555,#111); }
    .side-turn-stone.white { background: radial-gradient(circle at 35% 35%,#fff,#ccc); }
    .side-turn-label {
      font-size: 0.68rem; color: var(--gold-light);
      letter-spacing: 0.06em; animation: pulse 1.5s ease-in-out infinite;
    }
    .side-turn-name {
      font-size: 0.75rem; font-weight: 700; color: var(--text-light);
      margin-top: 3px; letter-spacing: 0.05em;
    }

    /* 建議卡片（右欄版） */
    .hint-card {
      background: linear-gradient(135deg, rgba(52,152,219,0.12), rgba(41,128,185,0.08));
      border: 1px solid rgba(52,152,219,0.35);
      border-radius: 10px; padding: 10px;
      animation: hintCardIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes hintCardIn { from{transform:translateY(8px) scale(0.95);opacity:0} to{transform:none;opacity:1} }
    .hint-card-header { display:flex; align-items:center; gap:5px; margin-bottom:6px; }
    .hint-icon { font-size: 1rem; }
    .hint-label { flex:1; font-size:0.72rem; font-weight:700; color:#74b9ff; }
    .hint-close { background:none; border:none; color:var(--text-dim); font-size:0.8rem;
      cursor:pointer; padding:1px 4px; border-radius:3px; }
    .hint-close:hover { color:var(--text-light); }
    .hint-reason { font-size:0.7rem; line-height:1.6; color:var(--text-light); margin-bottom:6px; }
    .hint-tags { display:flex; gap:4px; flex-wrap:wrap; }
    .hint-tag { font-size:0.6rem; padding:2px 6px; border-radius:8px; font-weight:700; }
    .hint-tag-win   { background:rgba(231,76,60,0.25);  color:#e74c3c; }
    .hint-tag-block { background:rgba(39,174,96,0.25);  color:#2ecc71; }
    .hint-tag-atk   { background:rgba(241,196,15,0.25); color:#f1c40f; }
    .hint-tag-pos   { background:rgba(52,152,219,0.25); color:#74b9ff; }

    /* 空白提示（還沒按建議時） */
    .side-empty-hint {
      background: rgba(255,255,255,0.03);
      border: 1px dashed rgba(255,255,255,0.1);
      border-radius: 10px; padding: 12px 8px;
      text-align: center;
      font-size: 0.65rem; color: var(--text-dim); line-height: 1.6;
    }
    .side-empty-hint .ico { font-size: 1.4rem; display:block; margin-bottom:5px; opacity:0.5; }

    /* ── 手機版：小螢幕改回垂直 ── */
    @media (max-width: 600px) {
      .game-main { flex-direction: column; align-items: center; gap: 6px; padding: 0 4px; }
      .side-controls {
        flex-direction: row; width: auto; padding-top: 0;
        justify-content: center; flex-wrap: wrap; gap: 6px;
      }
      .side-btn { flex-direction: row; width: auto; padding: 8px 12px; font-size: 0.72rem; }
      .side-btn .btn-ico { font-size: 1rem; }
      .side-info { flex-direction: row; width: 100%; padding-top: 0;
        justify-content: center; align-items: flex-start; flex-wrap: wrap; gap: 6px; }
      .side-turn { display: flex; align-items: center; gap: 8px; padding: 6px 12px; }
      .side-turn-stone { margin: 0; width: 20px; height: 20px; }
      .hint-card { flex: 1; min-width: 200px; }
      .side-empty-hint { display: none; }
    }

    @keyframes hintPulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    @keyframes hintRing {
      0%   { opacity:1;  transform:scale(1);    }
      50%  { opacity:0.5;transform:scale(1.15); }
      100% { opacity:1;  transform:scale(1);    }
    }
    .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75);
      backdrop-filter:blur(6px); z-index:200; align-items:center; justify-content:center; }
    .overlay.show { display:flex; }
    .win-card { background:linear-gradient(135deg,var(--bg-mid),#0e0906);
      border:1px solid rgba(212,168,67,0.4); border-radius:16px; padding:36px 44px; text-align:center;
      box-shadow:0 24px 80px rgba(0,0,0,0.8); animation:cardIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes cardIn { from{transform:scale(0.7) translateY(40px);opacity:0} to{transform:scale(1);opacity:1} }
    .win-emoji { font-size:3rem; margin-bottom:10px; }
    .win-title { font-family:'ZCOOL XiaoWei',serif; font-size:1.7rem; letter-spacing:0.3em;
      background:linear-gradient(135deg,var(--gold-light),var(--gold));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:6px; }
    .win-sub { color:var(--text-dim); font-size:0.82rem; margin-bottom:24px; }
    .win-btns { display:flex; gap:10px; justify-content:center; }

    /* TUTORIAL */
    #tutorialView { width:100%; max-width:460px; padding:0 12px 40px; display:none; flex-direction:column; }
    .progress-wrap { margin:6px 0 14px; }
    .progress-label { font-size:0.72rem; color:var(--text-dim); margin-bottom:5px;
      display:flex; justify-content:space-between; }
    .progress-bar { height:4px; background:rgba(255,255,255,0.1); border-radius:2px; overflow:hidden; }
    .progress-fill { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold-light));
      border-radius:2px; transition:width 0.5s ease; }
    .cat-pills { display:flex; gap:8px; flex-wrap:wrap; margin:4px 0 12px; }
    .cat-pill { padding:6px 14px; border-radius:20px; border:1px solid rgba(212,168,67,0.3);
      background:rgba(255,255,255,0.04); color:var(--text-dim); font-size:0.75rem;
      cursor:pointer; transition:all 0.2s; font-family:'Noto Serif TC',serif; }
    .cat-pill.active { background:rgba(212,168,67,0.2); color:var(--gold-light); border-color:var(--gold); }
    .lesson-list { display:flex; flex-direction:column; gap:10px; }
    .lesson-card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
      border-radius:12px; padding:14px 16px; cursor:pointer; transition:all 0.2s;
      display:flex; align-items:center; gap:12px; }
    .lesson-card:hover { background:rgba(212,168,67,0.08); border-color:rgba(212,168,67,0.3); }
    .lesson-card.done { border-left:3px solid var(--green); }
    .lesson-icon { font-size:1.6rem; flex-shrink:0; }
    .lesson-meta { flex:1; }
    .lesson-title { font-size:0.9rem; font-weight:700; margin-bottom:3px; }
    .lesson-desc { font-size:0.72rem; color:var(--text-dim); line-height:1.4; }
    .lesson-badge { font-size:0.65rem; padding:2px 8px; border-radius:10px; flex-shrink:0; }
    .badge-basic { background:rgba(39,174,96,0.2); color:#2ecc71; }
    .badge-mid   { background:rgba(241,196,15,0.2); color:#f1c40f; }
    .badge-adv   { background:rgba(192,57,43,0.2);  color:#e74c3c; }

    /* LESSON MODAL */
    .lesson-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88);
      backdrop-filter:blur(8px); z-index:300; overflow-y:auto; }
    .lesson-modal.show { display:block; }
    .lesson-modal-inner { min-height:100vh; padding:20px 16px 60px; max-width:480px; margin:0 auto; }
    .modal-header { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
    .modal-back { background:rgba(255,255,255,0.08); border:none; color:var(--text-light);
      border-radius:8px; padding:8px 14px; font-family:'Noto Serif TC',serif; font-size:0.82rem; cursor:pointer; }
    .modal-title { font-family:'ZCOOL XiaoWei',serif; font-size:1.2rem; letter-spacing:0.12em; }
    .demo-board-wrap { text-align:center; margin:10px 0; }
    #demoCanvas { border-radius:8px; max-width:100%; }
    .step-nav { display:flex; align-items:center; justify-content:space-between; margin:10px 0; gap:8px; }
    .step-info { flex:1; text-align:center; font-size:0.75rem; color:var(--text-dim); }
    .step-dots { display:flex; gap:5px; justify-content:center; margin-bottom:4px; }
    .step-dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.2); transition:all 0.2s; }
    .step-dot.active { background:var(--gold); transform:scale(1.3); }
    .step-btn { padding:8px 14px; border:1px solid rgba(212,168,67,0.3); background:rgba(212,168,67,0.1);
      color:var(--gold-light); border-radius:8px; font-family:'Noto Serif TC',serif;
      font-size:0.78rem; cursor:pointer; transition:all 0.2s; }
    .step-btn:disabled { opacity:0.3; cursor:default; }
    .step-btn:not(:disabled):hover { background:rgba(212,168,67,0.2); }
    .explain-box { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
      border-radius:10px; padding:14px; margin:8px 0; }
    .explain-title { font-size:0.88rem; font-weight:700; color:var(--gold-light); margin-bottom:8px; }
    .explain-body { font-size:0.82rem; line-height:1.85; color:var(--text-light); }
    .explain-body .tag { display:inline-block; padding:1px 8px; border-radius:10px;
      font-size:0.72rem; margin:2px; vertical-align:middle; }
    .tag-atk { background:rgba(192,57,43,0.3); color:#e74c3c; }
    .tag-def { background:rgba(39,174,96,0.3);  color:#2ecc71; }
    .tag-key { background:rgba(212,168,67,0.25); color:var(--gold-light); }
    .tip-box { background:rgba(212,168,67,0.07); border-left:3px solid var(--gold);
      border-radius:0 8px 8px 0; padding:12px 14px; margin:8px 0;
      font-size:0.8rem; line-height:1.7; color:var(--text-dim); }
    .tip-box strong { color:var(--gold-light); }
    .complete-btn { width:100%; padding:13px; margin-top:18px; border:none; border-radius:10px;
      background:linear-gradient(135deg,var(--gold),#b8860b); color:#1a0e00;
      font-family:'Noto Serif TC',serif; font-size:0.92rem; font-weight:700;
      letter-spacing:0.1em; cursor:pointer; transition:all 0.2s; }
    .complete-btn:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(212,168,67,0.3); }
  </style>
</head>
<body>

<header>
  <div class="title-main">五子棋</div>
  <div class="title-sub">GOMOKU · 連珠</div>
</header>

<div class="nav-tabs">
  <button class="nav-tab active" id="tabGame"     onclick="switchTab('game')">♟ 對弈</button>
  <button class="nav-tab"        id="tabTutorial" onclick="switchTab('tutorial')">📖 教學</button>
</div>

<!-- GAME VIEW -->
<div id="gameView">
  <!-- 模式選擇 & 計分（保持在頂部） -->
  <div class="mode-bar">
    <button class="mode-btn"        id="modeHuman" onclick="setMode('human')">👥 雙人對戰</button>
    <button class="mode-btn active" id="modeAI"    onclick="setMode('ai')">🤖 人機對戰</button>
  </div>

  <!-- 難度選擇（只在人機模式顯示） -->
  <div class="diff-bar" id="diffBar">
    <span class="diff-label">難度：</span>
    <button class="diff-btn active-normal" id="diffEasy"   onclick="setDiff('easy')">🌱 新手</button>
    <button class="diff-btn"              id="diffNormal"  onclick="setDiff('normal')">⚔️ 正常</button>
    <button class="diff-btn"              id="diffHard"    onclick="setDiff('hard')">🔥 高手</button>
  </div>
  <div class="score-bar">
    <div class="player-info" id="p1info">
      <div class="stone-dot black"></div>
      <span class="player-name">黑子</span>
      <span class="player-score" id="score1">0</span>
    </div>
    <span class="score-sep">—</span>
    <div class="player-info" id="p2info">
      <div class="stone-dot white"></div>
      <span class="player-name" id="p2name">白子</span>
      <span class="player-score" id="score2">0</span>
    </div>
  </div>

  <!-- 三欄主區域 -->
  <div class="game-main">

    <!-- 左欄：操作按鈕 -->
    <div class="side-controls">
      <button class="side-btn side-btn-primary" onclick="newGame()">
        <span class="btn-ico">♟</span>新局
      </button>
      <button class="side-btn side-btn-secondary" onclick="undoMove()">
        <span class="btn-ico">↩</span>悔棋
      </button>
      <button class="side-btn side-btn-hint" onclick="showHint()" id="hintBtn">
        <span class="btn-ico">💡</span>建議
      </button>
      <button class="side-btn side-btn-danger" onclick="resetScore()">
        <span class="btn-ico">🗑</span>清除分數
      </button>
    </div>

    <!-- 中欄：棋盤 -->
    <div class="board-wrap">

let completedLessons = JSON.parse(localStorage.getItem('gomoku_lessons') || '[]');
let currentLesson = null, currentStep = 0, currentCat = 'all';

// Demo board: 9x9 mini board centered on rows 3-11, cols 3-11 of a 15x15 grid
const demoCanvas = document.getElementById('demoCanvas');
const dctx = demoCanvas.getContext('2d');
const isMobile = window.innerWidth < 400;
const D    = isMobile ? Math.floor((window.innerWidth - 48) / 10) : 34;
const DPAD = D;
const DSIZE = 9;
const DC   = DPAD * 2 + D * (DSIZE - 1);
demoCanvas.width = demoCanvas.height = DC;
demoCanvas.style.width = DC + 'px';
demoCanvas.style.height = DC + 'px';

// Map 15x15 coords to 9x9 mini board (offset by 3)
function mapCoord(r, c) { return [r - 3, c - 3]; }

function drawDemoBoard(stones, highlights) {
  dctx.clearRect(0, 0, DC, DC);
  dctx.fillStyle = '#c8933a';
  dctx.fillRect(0, 0, DC, DC);
  dctx.strokeStyle = 'rgba(120,70,20,0.12)'; dctx.lineWidth = 1;
  for (let i = 0; i < DC; i += 5) {
    dctx.beginPath(); dctx.moveTo(0, i); dctx.lineTo(DC, i); dctx.stroke();
  }
  dctx.strokeStyle = '#5c3d1a'; dctx.lineWidth = 0.7;
  for (let i = 0; i < DSIZE; i++) {
    const x = DPAD+i*D, y = DPAD+i*D;
    dctx.beginPath(); dctx.moveTo(x,DPAD); dctx.lineTo(x,DPAD+(DSIZE-1)*D); dctx.stroke();
    dctx.beginPath(); dctx.moveTo(DPAD,y); dctx.lineTo(DPAD+(DSIZE-1)*D,y); dctx.stroke();
  }
  dctx.fillStyle = '#5c3d1a';
  dctx.beginPath(); dctx.arc(DPAD+4*D, DPAD+4*D, 3, 0, Math.PI*2); dctx.fill();

  // Highlights (★ = suggested positions)
  highlights.forEach(([r, c]) => {
    const [br, bc] = mapCoord(r, c);
    if (br < 0 || br >= DSIZE || bc < 0 || bc >= DSIZE) return;
    const x = DPAD+bc*D, y = DPAD+br*D;
    dctx.strokeStyle = 'rgba(240,200,96,0.85)';
    dctx.lineWidth = 2; dctx.setLineDash([4,3]);
    dctx.beginPath(); dctx.arc(x, y, D*0.38, 0, Math.PI*2); dctx.stroke();
    dctx.setLineDash([]);
    dctx.fillStyle = 'rgba(240,200,96,0.9)';
    dctx.font = `${D*0.38}px serif`;
    dctx.textAlign = 'center'; dctx.textBaseline = 'middle';
    dctx.fillText('★', x, y);
  });

  // Stones
  stones.forEach(([r, c, p]) => {
    const [br, bc] = mapCoord(r, c);
    if (br < 0 || br >= DSIZE || bc < 0 || bc >= DSIZE) return;
    const x = DPAD+bc*D, y = DPAD+br*D, radius = D*0.42;
    const grad = dctx.createRadialGradient(x-radius*0.3,y-radius*0.3,radius*0.05,x,y,radius);
    if (p === 'b') {
      grad.addColorStop(0,'#666'); grad.addColorStop(0.4,'#222'); grad.addColorStop(1,'#050505');
    } else {
      grad.addColorStop(0,'#fff'); grad.addColorStop(0.5,'#e8e0d5'); grad.addColorStop(1,'#b0a898');
    }
    dctx.shadowColor='rgba(0,0,0,0.4)'; dctx.shadowBlur=4; dctx.shadowOffsetX=1; dctx.shadowOffsetY=2;
    dctx.fillStyle = grad;
    dctx.beginPath(); dctx.arc(x,y,radius,0,Math.PI*2); dctx.fill();
    dctx.shadowColor='transparent';
    if (p === 'w') {
      const shine = dctx.createRadialGradient(x-radius*0.35,y-radius*0.35,0,x-radius*0.2,y-radius*0.2,radius*0.5);
      shine.addColorStop(0,'rgba(255,255,255,0.6)'); shine.addColorStop(1,'rgba(255,255,255,0)');
      dctx.fillStyle=shine; dctx.beginPath(); dctx.arc(x,y,radius,0,Math.PI*2); dctx.fill();
    }
  });
}

function renderLessonList() {
  const list = document.getElementById('lessonList');
  list.innerHTML = '';
  const filtered = currentCat === 'all' ? LESSONS : LESSONS.filter(l => l.cat === currentCat);
  filtered.forEach(lesson => {
    const done = completedLessons.includes(lesson.id);
    const card = document.createElement('div');
    card.className = 'lesson-card' + (done ? ' done' : '');
    card.innerHTML = `
      <div class="lesson-icon">${lesson.icon}</div>
      <div class="lesson-meta">
        <div class="lesson-title">${lesson.title}${done ? ' <span style="color:var(--green)">✓</span>' : ''}</div>
        <div class="lesson-desc">${lesson.desc}</div>
      </div>
      <span class="lesson-badge badge-${lesson.badge}">${lesson.badgeText}</span>
    `;
    card.onclick = () => openLesson(lesson);
    list.appendChild(card);
  });
  updateProgress();
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderLessonList();
}

function updateProgress() {
  const total = LESSONS.length, done = completedLessons.length;
  document.getElementById('progressText').textContent = `${done} / ${total} 完成`;
  document.getElementById('progressFill').style.width = `${(done/total)*100}%`;
}

function openLesson(lesson) {
  currentLesson = lesson; currentStep = 0;
  document.getElementById('modalTitle').textContent = lesson.title;
  document.getElementById('lessonModal').classList.add('show');
  document.body.style.overflow = 'hidden';
  const done = completedLessons.includes(lesson.id);
  document.getElementById('completeBtn').textContent = done ? '✓ 已學習完成' : '✓ 標記為已學習';
  renderStep();
}

function closeLesson() {
  document.getElementById('lessonModal').classList.remove('show');
  document.body.style.overflow = '';
  renderLessonList();
}

function renderStep() {
  const lesson = currentLesson, step = lesson.steps[currentStep], total = lesson.steps.length;
  // dots
  const dots = document.getElementById('stepDots');
  dots.innerHTML = '';
  for (let i=0; i<total; i++) {
    const d = document.createElement('div');
    d.className = 'step-dot' + (i===currentStep?' active':'');
    dots.appendChild(d);
  }
  document.getElementById('stepText').textContent = `步驟 ${currentStep+1} / ${total}`;
  document.getElementById('prevBtn').disabled = currentStep === 0;
  document.getElementById('nextBtn').disabled = false;
  document.getElementById('nextBtn').textContent = currentStep===total-1 ? '完成 ✓' : '下一步';
  document.getElementById('explainTitle').textContent = step.title;
  document.getElementById('explainBody').innerHTML  = step.body;
  document.getElementById('tipBox').innerHTML = step.tip ? `💡 <strong>小提示</strong><br>${step.tip}` : '';
  drawDemoBoard(step.board || [], step.highlights || []);
}

function prevStep() { if (currentStep > 0) { currentStep--; renderStep(); } }
function nextStep() {
  if (currentStep < currentLesson.steps.length-1) { currentStep++; renderStep(); }
  else completeLesson();
}
function completeLesson() {
  if (!completedLessons.includes(currentLesson.id)) {
    completedLessons.push(currentLesson.id);
    localStorage.setItem('gomoku_lessons', JSON.stringify(completedLessons));
  }
  document.getElementById('completeBtn').textContent = '✓ 已學習完成';
  setTimeout(closeLesson, 400);
}

const BOARD_SIZE = 15;
const CELL = window.innerWidth < 380 ? Math.floor((window.innerWidth - 56) / 14) : 30;
const PAD  = CELL;
const CANVAS_SIZE = PAD * 2 + CELL * (BOARD_SIZE-1);
let board = [], currentPlayer = 1, gameOver = false;
let history = [], scores = {1:0,2:0}, mode = 'ai', aiThinking = false;
let difficulty = 'easy'; // 'easy' | 'normal' | 'hard'

const canvas = document.getElementById('board');
const ctx    = canvas.getContext('2d');
canvas.width = canvas.height = CANVAS_SIZE;

function initBoard() {
  board = Array.from({length:BOARD_SIZE},()=>Array(BOARD_SIZE).fill(0));
  currentPlayer=1; gameOver=false; aiThinking=false; history=[];
  updateTurnText(); drawBoard();
}

function drawBoard() {
  ctx.clearRect(0,0,CANVAS_SIZE,CANVAS_SIZE);
  ctx.fillStyle='#c8933a'; ctx.fillRect(0,0,CANVAS_SIZE,CANVAS_SIZE);
  ctx.strokeStyle='rgba(120,70,20,0.12)'; ctx.lineWidth=1;
  for (let i=0;i<CANVAS_SIZE;i+=6){ctx.beginPath();ctx.moveTo(0,i+Math.sin(i*0.05)*2);ctx.lineTo(CANVAS_SIZE,i+Math.sin(i*0.05+1)*2);ctx.stroke();}
  ctx.strokeStyle='#5c3d1a'; ctx.lineWidth=0.8;
  for (let i=0;i<BOARD_SIZE;i++){
    const x=PAD+i*CELL,y=PAD+i*CELL;
    ctx.beginPath();ctx.moveTo(x,PAD);ctx.lineTo(x,PAD+(BOARD_SIZE-1)*CELL);ctx.stroke();
    ctx.beginPath();ctx.moveTo(PAD,y);ctx.lineTo(PAD+(BOARD_SIZE-1)*CELL,y);ctx.stroke();
  }
  [[3,3],[3,7],[3,11],[7,3],[7,7],[7,11],[11,3],[11,7],[11,11]].forEach(([r,c])=>{
    ctx.fillStyle='#5c3d1a';ctx.beginPath();ctx.arc(PAD+c*CELL,PAD+r*CELL,3,0,Math.PI*2);ctx.fill();
  });
  for (let r=0;r<BOARD_SIZE;r++) for (let c=0;c<BOARD_SIZE;c++) if(board[r][c]) drawStone(r,c,board[r][c]);
  if (history.length>0){
    const last=history[history.length-1];
    ctx.strokeStyle=last.player===1?'rgba(255,200,0,0.9)':'rgba(255,100,0,0.9)';
    ctx.lineWidth=2; ctx.beginPath(); ctx.arc(PAD+last.c*CELL,PAD+last.r*CELL,CELL*0.18,0,Math.PI*2); ctx.stroke();
  }
}

function drawStone(r,c,player){
  const x=PAD+c*CELL,y=PAD+r*CELL,radius=CELL*0.44;
  const grad=ctx.createRadialGradient(x-radius*0.3,y-radius*0.3,radius*0.05,x,y,radius);
  if(player===1){grad.addColorStop(0,'#666');grad.addColorStop(0.4,'#222');grad.addColorStop(1,'#050505');}
  else{grad.addColorStop(0,'#fff');grad.addColorStop(0.5,'#e8e0d5');grad.addColorStop(1,'#b0a898');}
  ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=5;ctx.shadowOffsetX=2;ctx.shadowOffsetY=3;
  ctx.fillStyle=grad;ctx.beginPath();ctx.arc(x,y,radius,0,Math.PI*2);ctx.fill();
  ctx.shadowColor='transparent';
  if(player===2){
    const shine=ctx.createRadialGradient(x-radius*0.35,y-radius*0.35,0,x-radius*0.2,y-radius*0.2,radius*0.5);
    shine.addColorStop(0,'rgba(255,255,255,0.6)');shine.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=shine;ctx.beginPath();ctx.arc(x,y,radius,0,Math.PI*2);ctx.fill();
  }
}

function highlightWin(cells){cells.forEach(([r,c])=>{ctx.strokeStyle='#f0c860';ctx.lineWidth=3;ctx.beginPath();ctx.arc(PAD+c*CELL,PAD+r*CELL,CELL*0.44,0,Math.PI*2);ctx.stroke();});}

/* ══════════════════════════════════════════════════════
   HINT ENGINE — 分析當前局面，給出最佳建議落點並說明原因
   優先順序：
   1. 己方五連（立即獲勝）
   2. 擋對方五連（立即防守）
   3. 己方活四
   4. 擋對方活四
   5. 己方衝四
   6. 擋對方衝四
   7. 己方活三
   8. 擋對方活三
   9. 整體最高分落點
══════════════════════════════════════════════════════ */
let hintPos = null;       // {r, c} 目前顯示的建議位置
let hintAnimId = null;    // requestAnimationFrame ID
let hintPhase = 0;        // 動畫相位

// 分析某個位置對玩家 p 的棋形強度，回傳 { score, level, desc }
function analyzeMove(r, c, p) {
  const opp = p === 1 ? 2 : 1;
  board[r][c] = p;

  // 先檢查是否直接獲勝
  if (checkWin(r, c)) {
    board[r][c] = 0;
    return { score: 1000000, level: 'win', desc: '落子此處可以直接連成五子獲勝！' };
  }
  board[r][c] = 0;

  // 檢查對手是否有即將連五（需要堵）
  board[r][c] = opp;
  if (checkWin(r, c)) {
    board[r][c] = 0;
    return { score: 900000, level: 'block', desc: '對手下一步即可連五，必須立即封堵！' };
  }
  board[r][c] = 0;

  // 詳細棋形分析
  const myShape   = getShapeAt(r, c, p);
  const oppShape  = getShapeAt(r, c, opp);

  // 根據棋形決定優先級
  if (myShape.live4)  return { score: 500000 + myShape.score,  level: 'atk',   desc: `形成活四！對手無法同時封住兩端，下步可連五。（我方最強攻勢）` };
  if (oppShape.live4) return { score: 480000 + oppShape.score, level: 'block', desc: `對手即將形成活四，必須優先封堵此位置，否則將無法防守！` };
  if (myShape.rush4)  return { score: 300000 + myShape.score,  level: 'atk',   desc: `形成衝四，強迫對手回防，同時可配合其他方向形成必勝局。` };
  if (oppShape.rush4) return { score: 280000 + oppShape.score, level: 'block', desc: `對手即將形成衝四，搶先封堵可讓對手失去主動權。` };
  if (myShape.live3)  return { score: 150000 + myShape.score,  level: 'atk',   desc: `形成活三！兩端都有空間延伸，下步可嘗試形成活四或雙三。` };
  if (oppShape.live3) return { score: 130000 + oppShape.score, level: 'block', desc: `對手即將形成活三，及早封堵可壓制對手的進攻節奏。` };

  // 綜合分數
  const combined = myShape.score * 1.1 + oppShape.score;
  let desc = '均衡落點，同時發展己方棋形並牽制對手。';
  if (myShape.score > oppShape.score * 1.5) desc = '進攻性落點，有利於建立己方連子棋形。';
  else if (oppShape.score > myShape.score * 1.5) desc = '防守性落點，有效壓制對手的棋形發展。';
  return { score: combined, level: 'pos', desc };
}

// 計算落子後的棋形特徵（活四、衝四、活三…）
function getShapeAt(r, c, p) {
  board[r][c] = p;
  let live4=false, rush4=false, live3=false, score=0;
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr,dc] of dirs) {
    let cnt=1, openEnds=0, blocked=0;
    for (let d=1;d<5;d++){
      const nr=r+dr*d,nc=c+dc*d;
      if(nr<0||nr>=BOARD_SIZE||nc<0||nc>=BOARD_SIZE){blocked++;break;}
      if(board[nr][nc]===p)cnt++;
      else{if(!board[nr][nc])openEnds++;else blocked++;break;}
    }
    for (let d=1;d<5;d++){
      const nr=r-dr*d,nc=c-dc*d;
      if(nr<0||nr>=BOARD_SIZE||nc<0||nc>=BOARD_SIZE){blocked++;break;}
      if(board[nr][nc]===p)cnt++;
      else{if(!board[nr][nc])openEnds++;else blocked++;break;}
    }
    if (cnt>=4 && openEnds>=2) live4=true;
    if (cnt>=4 && openEnds===1) rush4=true;
    if (cnt>=3 && openEnds>=2) live3=true;
    const base=[0,1,10,100,1000,100000][Math.min(cnt,5)];
    score += base * (openEnds>0?openEnds:0.5);
  }
  board[r][c]=0;
  return {live4,rush4,live3,score};
}

// 主建議函式
function getBestHint() {
  if (history.length===0) return { r:7, c:7, level:'pos', desc:'第一手走天元（棋盤正中央）是最穩固的開局，可向四面八方均衡發展。' };
  const moves = getCandidates();
  let best=null, bestResult=null, bestScore=-Infinity;
  for (const [r,c] of moves){
    if (board[r][c]) continue;
    const result = analyzeMove(r, c, currentPlayer);
    if (result.score > bestScore){ bestScore=result.score; best=[r,c]; bestResult=result; }
  }
  if (!best) return null;
  return { r:best[0], c:best[1], ...bestResult };
}

// 建議按鈕觸發
function showHint(){
  if (gameOver||aiThinking) return;
  if (mode==='ai'&&currentPlayer===2) return;
  clearHint();
  const btn = document.getElementById('hintBtn');
  btn.textContent='🔍 分析中…'; btn.classList.add('thinking');
  setTimeout(()=>{
    const hint = getBestHint();
    btn.textContent='💡 建議'; btn.classList.remove('thinking');
    if (!hint) return;
    hintPos = {r:hint.r, c:hint.c};
    // 顯示說明卡片
    const card = document.getElementById('hintCard');
    const icons = {win:'🏆',block:'🛡️',atk:'⚔️',pos:'💡'};
    const labels = {win:'立即獲勝',block:'緊急防守',atk:'強力進攻',pos:'最佳落點'};
    const tagClass = {win:'hint-tag-win',block:'hint-tag-block',atk:'hint-tag-atk',pos:'hint-tag-pos'};
    document.getElementById('hintIcon').textContent  = icons[hint.level];
    document.getElementById('hintLabel').textContent = labels[hint.level];
    document.getElementById('hintReason').textContent = hint.desc;
    // 位置標籤
    const col = String.fromCharCode(65+hint.c); // A~O
    const row = hint.r + 1;
    document.getElementById('hintTags').innerHTML = `
      <span class="hint-tag ${tagClass[hint.level]}">${labels[hint.level]}</span>
      <span class="hint-tag hint-tag-pos">位置 ${col}${row}</span>
    `;
    card.style.display='block';
    const eh = document.getElementById('emptyHint');
    if(eh) eh.style.display='none';
    // 啟動棋盤動畫
    startHintAnimation();
  }, 80);
}

function clearHint(){
  hintPos=null;
  if (hintAnimId){ cancelAnimationFrame(hintAnimId); hintAnimId=null; }
  document.getElementById('hintCard').style.display='none';
  const eh = document.getElementById('emptyHint');
  if(eh) eh.style.display='';
  drawBoard();
}

function startHintAnimation(){
  hintPhase=0;
  function animate(){
    if (!hintPos){ drawBoard(); return; }
    hintPhase += 0.06;
    drawBoard();
    drawHintMarker(hintPos.r, hintPos.c, hintPhase);
    hintAnimId = requestAnimationFrame(animate);
  }
  animate();
}

function drawHintMarker(r, c, phase){
  const x = PAD+c*CELL, y = PAD+r*CELL;
  const alpha  = 0.55 + 0.45*Math.sin(phase);
  const scale  = 1.0  + 0.18*Math.sin(phase);
  const radius = CELL * 0.44 * scale;

  // 外圈光暈
  const glow = ctx.createRadialGradient(x,y,0,x,y,radius*1.8);
  glow.addColorStop(0, `rgba(116,185,255,${alpha*0.35})`);
  glow.addColorStop(1, 'rgba(116,185,255,0)');
  ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(x,y,radius*1.8,0,Math.PI*2); ctx.fill();

  // 主圓環
  ctx.strokeStyle=`rgba(116,185,255,${alpha})`;
  ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(x,y,radius,0,Math.PI*2); ctx.stroke();

  // 四個角十字準心
  const arm=CELL*0.28;
  ctx.strokeStyle=`rgba(116,185,255,${alpha})`;
  ctx.lineWidth=2;
  [[0,-1],[0,1],[-1,0],[1,0]].forEach(([dx,dy])=>{
    ctx.beginPath();
    ctx.moveTo(x+dx*(radius+2), y+dy*(radius+2));
    ctx.lineTo(x+dx*(radius+arm), y+dy*(radius+arm));
    ctx.stroke();
  });

  // 中心點
  ctx.fillStyle=`rgba(116,185,255,${alpha})`;
  ctx.beginPath(); ctx.arc(x,y,2.5,0,Math.PI*2); ctx.fill();
}
canvas.addEventListener('click', handleClick);
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0],rect=canvas.getBoundingClientRect();
  const sx=canvas.width/rect.width,sy=canvas.height/rect.height;
  handleClick({offsetX:(t.clientX-rect.left)*sx,offsetY:(t.clientY-rect.top)*sy});
},{passive:false});

function handleClick(e){
  if(gameOver||aiThinking)return;
  if(mode==='ai'&&currentPlayer===2)return;
  const c=Math.round((e.offsetX-PAD)/CELL),r=Math.round((e.offsetY-PAD)/CELL);
  if(r<0||r>=BOARD_SIZE||c<0||c>=BOARD_SIZE)return;
  placeStone(r,c);
}

function placeStone(r,c){
  if(board[r][c])return;
  clearHint(); // 落子後清除建議標記
  board[r][c]=currentPlayer;
  history.push({r,c,player:currentPlayer});
  drawBoard();
  const win=checkWin(r,c);
  if(win){highlightWin(win);showWin(currentPlayer);return;}
  if(history.length===BOARD_SIZE*BOARD_SIZE){showDraw();return;}
  currentPlayer=currentPlayer===1?2:1;
  updateTurnText();
  if(mode==='ai'&&currentPlayer===2)setTimeout(aiMove,300);
}

function checkWin(r,c){
  const p=board[r][c];
  for(const [dr,dc] of [[0,1],[1,0],[1,1],[1,-1]]){
    const cells=[[r,c]];
    for(let d=1;d<5;d++){const nr=r+dr*d,nc=c+dc*d;if(nr<0||nr>=BOARD_SIZE||nc<0||nc>=BOARD_SIZE||board[nr][nc]!==p)break;cells.push([nr,nc]);}
    for(let d=1;d<5;d++){const nr=r-dr*d,nc=c-dc*d;if(nr<0||nr>=BOARD_SIZE||nc<0||nc>=BOARD_SIZE||board[nr][nc]!==p)break;cells.push([nr,nc]);}
    if(cells.length>=5)return cells;
  }
  return null;
}

function aiMove(){
  aiThinking = true;

  if (difficulty === 'easy') {
    // ── 新手：只看「立即輸贏」，其餘亂下 ──────────────────
    const moves = getCandidates();
    // 先檢查自己能否立即連五
    for (const [r,c] of moves) {
      if (board[r][c]) continue;
      board[r][c] = 2;
      if (checkWin(r,c)) { board[r][c]=0; aiThinking=false; placeStone(r,c); return; }
      board[r][c] = 0;
    }
    // 再檢查是否必須擋對手連五
    for (const [r,c] of moves) {
      if (board[r][c]) continue;
      board[r][c] = 1;
      if (checkWin(r,c)) { board[r][c]=0; aiThinking=false; placeStone(r,c); return; }
      board[r][c] = 0;
    }
    // 否則從候選中隨機挑一個（加一點隨機性讓新手更真實）
    const pool = moves.filter(([r,c]) => !board[r][c]);
    // 從前 8 個候選（靠近現有棋子）中隨機選，避免落子太遠
    const pickFrom = pool.slice(0, Math.min(8, pool.length));
    const pick = pickFrom[Math.floor(Math.random() * pickFrom.length)];
    aiThinking = false;
    if (pick) placeStone(pick[0], pick[1]);

  } else if (difficulty === 'normal') {
    // ── 正常：原本的貪婪評估（攻守兼顧）─────────────────
    let best=null, bestScore=-Infinity;
    const moves = getCandidates();
    for (const [r,c] of moves) {
      if (board[r][c]) continue;
      board[r][c]=2; const atk=evaluateBoard(2); board[r][c]=0;
      board[r][c]=1; const def=evaluateBoard(1); board[r][c]=0;
      const score = atk*1.1 + def;
      if (score > bestScore) { bestScore=score; best=[r,c]; }
    }
    aiThinking = false;
    if (best) placeStone(best[0], best[1]);

  } else {
    // ── 高手：威脅優先 + 多步預判（模擬對手反應）────────
    let best=null, bestScore=-Infinity;
    const moves = getCandidates();
    for (const [r,c] of moves) {
      if (board[r][c]) continue;

      // 1. 自己落子後立即贏
      board[r][c]=2;
      if (checkWin(r,c)) { board[r][c]=0; aiThinking=false; placeStone(r,c); return; }
      board[r][c]=0;

      // 2. 對手落子後立即贏 → 必擋
      board[r][c]=1;
      if (checkWin(r,c)) { board[r][c]=0; best=[r,c]; bestScore=Infinity; break; }
      board[r][c]=0;

      // 3. 深度評估：落子後模擬對手的最佳應對
      board[r][c]=2;
      const myAtk = evaluateBoard(2);
      // 模擬對手最好的應對位置（一步前瞻）
      let oppBest = 0;
      const oppMoves = getCandidates();
      for (const [or,oc] of oppMoves.slice(0,15)) { // 只看前15個候選加速
        if (board[or][oc]) continue;
        board[or][oc]=1;
        const s = evaluateBoard(1);
        if (s > oppBest) oppBest = s;
        board[or][oc]=0;
      }
      board[r][c]=0;

      board[r][c]=1; const myDef=evaluateBoard(1); board[r][c]=0;
      // 分數 = 自身攻擊 - 對手最佳反擊 + 防守價值
      const score = myAtk * 1.2 - oppBest * 0.8 + myDef;
      if (score > bestScore) { bestScore=score; best=[r,c]; }
    }
    aiThinking = false;
    if (best) placeStone(best[0], best[1]);
  }
}

function getCandidates(){
  const result=[],visited=Array.from({length:BOARD_SIZE},()=>Array(BOARD_SIZE).fill(false));
  for(let r=0;r<BOARD_SIZE;r++)for(let c=0;c<BOARD_SIZE;c++){
    if(!board[r][c])continue;
    for(let dr=-2;dr<=2;dr++)for(let dc=-2;dc<=2;dc++){
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<BOARD_SIZE&&nc>=0&&nc<BOARD_SIZE&&!board[nr][nc]&&!visited[nr][nc]){visited[nr][nc]=true;result.push([nr,nc]);}
    }
  }
  return result.length?result:[[7,7]];
}

function evaluateBoard(p){
  let total=0;
  for(let r=0;r<BOARD_SIZE;r++)for(let c=0;c<BOARD_SIZE;c++){
    if(board[r][c]!==p)continue;
    for(const [dr,dc] of [[0,1],[1,0],[1,1],[1,-1]]){
      let cnt=1,openEnds=0;
      for(let d=1;d<5;d++){const nr=r+dr*d,nc=c+dc*d;if(nr<0||nr>=BOARD_SIZE||nc<0||nc>=BOARD_SIZE)break;if(board[nr][nc]===p)cnt++;else{if(!board[nr][nc])openEnds++;break;}}
      for(let d=1;d<5;d++){const nr=r-dr*d,nc=c-dc*d;if(nr<0||nr>=BOARD_SIZE||nc<0||nc>=BOARD_SIZE)break;if(board[nr][nc]===p)cnt++;else{if(!board[nr][nc])openEnds++;break;}}
      total+=[0,1,10,100,1000,100000][Math.min(cnt,5)]*(openEnds>0?openEnds:0.5);
    }
  }
  return total;
}

function updateTurnText(){
  const names=['','黑子',mode==='ai'?'AI（白子）':'白子'];
  const isBlack = currentPlayer===1;
  // 右欄輪次顯示
  const stone = document.getElementById('turnStone');
  if(stone){ stone.className='side-turn-stone '+(isBlack?'black':'white'); }
  const tname = document.getElementById('turnName');
  if(tname) tname.textContent = names[currentPlayer];
  // 計分欄高亮
  document.getElementById('p1info').classList.toggle('active',currentPlayer===1);
  document.getElementById('p2info').classList.toggle('active',currentPlayer===2);
  // 相容舊的 turnText（手機版仍用到）
  const tt = document.getElementById('turnText');
  if(tt) tt.textContent='落子中';
}

function showWin(player){
  gameOver=true;scores[player]++;
  document.getElementById('score'+player).textContent=scores[player];
  const names={1:'黑子',2:mode==='ai'?'AI（白子）':'白子'};
  document.getElementById('winEmoji').textContent=player===1?'⚫':'⚪';
  document.getElementById('winTitle').textContent=`${names[player]} 勝利！`;
  document.getElementById('winSub').textContent='恭喜連成五子！';
  setTimeout(()=>document.getElementById('overlay').classList.add('show'),600);
}

function showDraw(){
  gameOver=true;
  document.getElementById('winEmoji').textContent='🤝';
  document.getElementById('winTitle').textContent='平局';
  document.getElementById('winSub').textContent='棋盤已滿，雙方平手！';
  setTimeout(()=>document.getElementById('overlay').classList.add('show'),300);
}

function closeOverlay(){document.getElementById('overlay').classList.remove('show');}
function newGame(){closeOverlay();clearHint();initBoard();document.getElementById('turnText').textContent='黑子先手';}
function undoMove(){
  if(gameOver||history.length===0)return;
  clearHint();
  const last=history.pop();board[last.r][last.c]=0;
  if(mode==='ai'&&history.length>0&&history[history.length-1].player===2){const p=history.pop();board[p.r][p.c]=0;}
  currentPlayer=history.length===0?1:(history[history.length-1].player===1?2:1);
  drawBoard();updateTurnText();
}
function resetScore(){
  scores={1:0,2:0};
  document.getElementById('score1').textContent='0';
  document.getElementById('score2').textContent='0';
}
function setMode(m){
  mode=m;
  document.getElementById('modeHuman').classList.toggle('active',m==='human');
  document.getElementById('modeAI').classList.toggle('active',m==='ai');
  document.getElementById('p2name').textContent=m==='ai'?'AI':'白子';
  // 難度列只在人機模式顯示
  const db = document.getElementById('diffBar');
  if(db) db.classList.toggle('hidden', m==='human');
  newGame();
}

function setDiff(d){
  difficulty = d;
  // 更新按鈕樣式
  ['easy','normal','hard'].forEach(k=>{
    const btn = document.getElementById('diff'+k.charAt(0).toUpperCase()+k.slice(1));
    if(!btn) return;
    btn.className = 'diff-btn';
    if(k===d) btn.classList.add('active-'+k);
  });
  newGame();
}
